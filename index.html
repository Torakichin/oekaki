<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>LoiLo風 手書きアプリ (修正版)</title>
<style>
  :root{
    --toolbar-h: 92px;
    --subbar-h: 44px;
    --bg: #f4f6f8;
    --panel: #ffffff;
    --line: #d8dee6;
    --text: #1f2937;
    --muted: #6b7280;
    --accent: #2f80ff;
    --accent-soft: rgba(47,128,255,.14);
    --danger: #ef4444;
    --shadow: 0 8px 24px rgba(15,23,42,.08);
    --radius: 16px;
  }

  *{box-sizing:border-box}
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    font-family: system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow:hidden;
  }

  #app{
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
  }

  /* ===== Top toolbar ===== */
  .toolbar-wrap{
    padding:10px 12px 8px;
    background: linear-gradient(#f8fafc,#f4f6f8);
    border-bottom:1px solid #e6ebf1;
    z-index:20;
  }

  .toolbar{
    background: var(--panel);
    border:1px solid var(--line);
    border-radius: 18px;
    box-shadow: var(--shadow);
    padding:10px 12px;
    display:flex;
    flex-wrap:wrap;
    gap:10px 12px;
    align-items:center;
  }

  .tool-group{
    display:flex;
    align-items:center;
    gap:6px;
    flex-wrap:wrap;
  }

  .divider{
    width:1px;
    height:34px;
    background:#e6ebf1;
    margin:0 2px;
  }

  .tool-btn{
    border:1px solid #d9e0e8;
    background:#fff;
    color:#1f2937;
    height:38px;
    min-width:38px;
    padding:0 10px;
    border-radius:12px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    font-size:14px;
    transition:.15s;
    user-select:none;
  }
  .tool-btn:hover{ background:#f8fbff; border-color:#bfd3ff; }
  .tool-btn.active{
    background: #eef5ff;
    border-color: #87b3ff;
    box-shadow: inset 0 0 0 1px #9bc0ff;
  }
  .tool-btn.small{
    height:34px;
    min-width:34px;
    border-radius:10px;
    font-size:13px;
    padding:0 8px;
  }

  .label{
    font-size:12px;
    color:var(--muted);
    margin-right:2px;
  }

  /* ===== Color palette ===== */
  .palette-wrap{
    position:relative;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .palette-toggle{
    border:1px solid #d9e0e8;
    background:#fff;
    height:38px;
    border-radius:12px;
    padding:0 10px;
    cursor:pointer;
    font-size:14px;
  }
  .palette-pop{
    position:absolute;
    top:48px;
    left:0;
    z-index:40;
    background:#fff;
    border:1px solid var(--line);
    border-radius:16px;
    box-shadow: var(--shadow);
    padding:12px;
    min-width:520px;
    display:none;
  }
  .palette-pop.open{ display:block; }

  .palette-grid{
    display:grid;
    grid-template-columns: repeat(12, 26px);
    gap:10px;
    align-items:center;
  }
  .swatch{
    width:26px; height:26px; border-radius:50%;
    border:1px solid rgba(0,0,0,.12);
    cursor:pointer;
    transition:.12s;
    position:relative;
  }
  .swatch:hover{ transform:scale(1.08); }
  .swatch.active::after{
    content:"";
    position:absolute; inset:-4px;
    border:2px solid var(--accent);
    border-radius:50%;
  }

  .palette-section{
    margin-top:10px;
    padding-top:10px;
    border-top:1px solid #eef2f6;
  }
  .palette-title{
    font-size:12px;
    color:#6b7280;
    margin-bottom:8px;
  }
  .recent-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    min-height:26px;
  }

  .custom-color-row{
    display:flex;
    align-items:center;
    gap:12px;
    margin-top:12px;
    flex-wrap:wrap;
  }
  .custom-color-row input[type="color"]{
    width:48px; height:34px; padding:0; border:none; background:transparent;
    cursor:pointer;
  }

  /* ===== Range / sliders ===== */
  .range-wrap{
    display:flex; align-items:center; gap:8px;
    min-width:180px;
  }
  .range-wrap input[type="range"]{ width:120px; }
  .range-value{
    font-size:12px; color:#6b7280; width:30px; text-align:right;
  }

  /* ===== Canvas area ===== */
  #canvasWrap{
    position:relative;
    flex:1;
    overflow:hidden;
    background:#fff;
  }
  #drawCanvas{
    position:absolute; inset:0;
    width:100%; height:100%;
    display:block;
    touch-action:none;
    cursor:crosshair;
    background:#fff;
  }

  /* ===== Selection box ===== */
  #selectionOverlay{
    position:absolute;
    inset:0;
    pointer-events:none;
    z-index:10;
  }

  .sel-box{
    position:absolute;
    border:2px solid var(--accent);
    background: rgba(47,128,255,.08);
    box-shadow: 0 0 0 1px rgba(255,255,255,.8) inset;
    pointer-events:none;
  }

  .handle{
    position:absolute;
    width:12px; height:12px;
    background:#fff;
    border:2px solid var(--accent);
    border-radius:50%;
    transform:translate(-50%,-50%);
    pointer-events:auto;
    cursor:pointer;
  }

  .handle.scale.nw,.handle.scale.se{ cursor:nwse-resize; }
  .handle.scale.ne,.handle.scale.sw{ cursor:nesw-resize; }
  .handle.rotate{
    width:14px; height:14px;
    background:#2f80ff;
    border:2px solid #fff;
    box-shadow:0 2px 8px rgba(47,128,255,.35);
    cursor:grab;
  }
  .handle.rotate:active{ cursor:grabbing; }

  .rotate-stick{
    position:absolute;
    width:2px;
    background:var(--accent);
    transform-origin:center top;
    pointer-events:none;
  }

  .selection-panel{
    position:absolute;
    z-index:12;
    background:#fff;
    border:1px solid var(--line);
    border-radius:14px;
    box-shadow: var(--shadow);
    padding:10px 12px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    align-items:center;
    max-width:min(96vw,1100px);
    pointer-events:auto;
  }

  .selection-panel .group{
    display:flex;
    align-items:center;
    gap:6px;
    flex-wrap:wrap;
  }

  .angle-badge{
    position:absolute;
    z-index:11;
    background:rgba(17,24,39,.86);
    color:#fff;
    padding:4px 8px;
    border-radius:999px;
    font-size:12px;
    pointer-events:none;
    transform:translate(-50%,-120%);
    white-space:nowrap;
  }

  .hidden{ display:none !important; }

  .file-input{
    display:none;
  }

  .hint{
    position:absolute;
    right:14px;
    bottom:14px;
    z-index:5;
    background:rgba(255,255,255,.9);
    border:1px solid #e6ebf1;
    border-radius:12px;
    padding:8px 10px;
    font-size:12px;
    color:#6b7280;
    box-shadow: var(--shadow);
    user-select:none;
  }

  @media (max-width: 980px){
    .palette-pop{ min-width: min(92vw,520px); }
    .palette-grid{ grid-template-columns: repeat(8, 26px); }
  }
</style>
</head>
<body>
<div id="app">
  <div class="toolbar-wrap">
    <div class="toolbar">
      <div class="tool-group">
        <button class="tool-btn active" id="tool-pencil" title="鉛筆">✏️ 鉛筆</button>
        <button class="tool-btn" id="tool-marker" title="マーカー">🖍 マーカー</button>
        <button class="tool-btn" id="tool-ruler" title="ものさし">📏 定規</button>
        <button class="tool-btn" id="tool-select" title="範囲選択">⬚ 選択</button>
      </div>

      <div class="divider"></div>

      <div class="tool-group">
        <span class="label">消しゴム</span>
        <button class="tool-btn small active" id="eraser-pixel">ピクセル</button>
        <button class="tool-btn small" id="eraser-object">オブジェクト</button>
        <button class="tool-btn small" id="eraser-clear">全消し</button>
      </div>

      <div class="divider"></div>

      <div class="tool-group palette-wrap">
        <button class="palette-toggle" id="paletteToggle">色</button>
        <div class="palette-pop" id="palettePop">
          <div class="palette-grid" id="paletteGrid"></div>

          <div class="palette-section">
            <div class="palette-title">最近使った色</div>
            <div class="recent-row" id="recentColors"></div>
          </div>

          <div class="palette-section">
            <div class="palette-title">カスタム色</div>
            <div class="custom-color-row">
              <input type="color" id="customColorPicker" value="#1e88e5" />
              <button class="tool-btn small" id="addCustomColor">最近使った色に追加</button>
            </div>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="tool-group range-wrap">
        <span class="label">太さ</span>
        <input type="range" id="sizeSlider" min="1" max="60" step="1" value="8" />
        <span class="range-value" id="sizeValue">8</span>
      </div>

      <div class="divider"></div>

      <div class="tool-group">
        <button class="tool-btn" id="undoBtn" title="戻る">↶ 戻る</button>
        <button class="tool-btn" id="redoBtn" title="進む">↷ 進む</button>
      </div>

      <div class="divider"></div>

      <div class="tool-group">
        <button class="tool-btn" id="insertImageBtn">🖼 画像</button>
        <button class="tool-btn" id="saveBtn">💾 保存</button>
        <button class="tool-btn" id="loadBtn">📂 読込</button>
      </div>
    </div>
  </div>

  <div id="canvasWrap">
    <canvas id="drawCanvas"></canvas>
    <div id="selectionOverlay"></div>
    <div class="hint">選択ツールで線をタップ、または囲むと、ハンドルで拡大縮小・回転ができます。</div>
  </div>

  <input class="file-input" type="file" id="imageInput" accept="image/*" />
  <input class="file-input" type="file" id="loadInput" accept=".json,application/json" />
</div>

<script>
(() => {
  // =========================================================
  // DOM Elements
  // =========================================================
  const canvasWrap = document.getElementById('canvasWrap');
  const canvas = document.getElementById('drawCanvas');
  const ctx = canvas.getContext('2d');
  const selectionOverlay = document.getElementById('selectionOverlay');

  const toolBtns = {
    pencil: document.getElementById('tool-pencil'),
    marker: document.getElementById('tool-marker'),
    ruler: document.getElementById('tool-ruler'),
    select: document.getElementById('tool-select'),
  };

  const eraserBtns = {
    pixel: document.getElementById('eraser-pixel'),
    object: document.getElementById('eraser-object'),
    clear: document.getElementById('eraser-clear'),
  };

  const paletteToggle = document.getElementById('paletteToggle');
  const palettePop = document.getElementById('palettePop');
  const paletteGrid = document.getElementById('paletteGrid');
  const recentColorsEl = document.getElementById('recentColors');
  const customColorPicker = document.getElementById('customColorPicker');
  const addCustomColorBtn = document.getElementById('addCustomColor');

  const sizeSlider = document.getElementById('sizeSlider');
  const sizeValue = document.getElementById('sizeValue');

  const undoBtn = document.getElementById('undoBtn');
  const redoBtn = document.getElementById('redoBtn');
  const insertImageBtn = document.getElementById('insertImageBtn');
  const saveBtn = document.getElementById('saveBtn');
  const loadBtn = document.getElementById('loadBtn');
  const imageInput = document.getElementById('imageInput');
  const loadInput = document.getElementById('loadInput');

  // =========================================================
  // Configuration
  // =========================================================
  const STORAGE_KEY_RECENT = 'loilo_like_recent_colors_v3';
  const STORAGE_KEY_DOC = 'loilo_like_last_doc_v3';

  const DEFAULT_COLORS = [
    '#e74c3c','#f39c12','#f1c40f','#2ecc71','#3498db','#9b59b6','#8d6e63','#000000','#ffffff','#c0c8d2','#f4a6a6','#ffd166',
    '#ffe082','#a5d6a7','#90caf9','#c5a3ff','#d7b28a','#6d5d4b','#e0e0e0','#cfd8dc','#f77eb6','#ffb74d','#fff176','#7bd389',
    '#64c7ec','#b388ff','#f7c59f','#90a4ae','#e6c9a8','#b0bec5','#c5cae9','#ef9a9a','#ffcc80','#fff59d','#b9f6ca','#b39ddb'
  ];

  const PENCIL_ALPHA = 1.0;
  const MARKER_ALPHA = 0.35;

  // =========================================================
  // State Management
  // =========================================================
  let dpr = Math.max(1, window.devicePixelRatio || 1);
  let viewW = 0, viewH = 0;

  let objects = []; 
  let undoStack = [];
  let redoStack = [];

  let currentTool = 'pencil'; 
  let eraserMode = 'pixel'; 
  let currentColor = '#3498db';
  let currentSize = 8;

  let isPointerDown = false;
  let currentStroke = null;

  let isRulerPreview = false;
  let rulerStart = null;
  let rulerCurrent = null;

  let selection = {
    ids: [],
    bbox: null, 
    transform: { tx:0, ty:0, sx:1, sy:1, rotation:0 },
  };

  let selectionUI = {
    boxEl: null,
    panelEl: null,
    angleEl: null,
    handles: {},
    rotateStick: null
  };

  let interaction = null; 
  let clipboardObjects = null;

  let recentColors = loadRecentColors();

  // =========================================================
  // Utilities & Math
  // =========================================================
  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
  function lerp(a,b,t){ return a + (b-a)*t; }
  function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }
  function radToDeg(r){ return r * 180 / Math.PI; }
  function degToRad(d){ return d * Math.PI / 180; }

  function deepClone(obj){ return JSON.parse(JSON.stringify(obj)); }

  function saveSnapshot(){
    undoStack.push(serializeDoc());
    if(undoStack.length > 80) undoStack.shift();
    redoStack.length = 0;
  }

  function serializeDoc(){
    return JSON.stringify({ objects, currentColor, currentSize, recentColors });
  }

  function restoreDoc(json){
    try{
      const data = typeof json === 'string' ? JSON.parse(json) : json;
      objects = Array.isArray(data.objects) ? data.objects : [];
      if(data.currentColor) currentColor = data.currentColor;
      if(data.currentSize) currentSize = data.currentSize;
      if(Array.isArray(data.recentColors)) recentColors = data.recentColors.slice(0,18);
      clearSelection();
      renderPalette();
      syncUI();
      redraw();
    }catch(e){
      console.error(e);
    }
  }

  function pushRecentColor(color){
    if(!color) return;
    color = normalizeColor(color);
    recentColors = [color, ...recentColors.filter(c => c.toLowerCase() !== color.toLowerCase())].slice(0, 18);
    localStorage.setItem(STORAGE_KEY_RECENT, JSON.stringify(recentColors));
    renderRecentColors();
  }

  function loadRecentColors(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY_RECENT);
      if(!raw) return [];
      const arr = JSON.parse(raw);
      return Array.isArray(arr) ? arr.slice(0,18) : [];
    }catch(e){ return []; }
  }

  function normalizeColor(color){
    const c = document.createElement('canvas').getContext('2d');
    c.fillStyle = color;
    return c.fillStyle;
  }

  function getCanvasPoint(e){
    const rect = canvas.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }

  function resizeCanvas(){
    const rect = canvasWrap.getBoundingClientRect();
    viewW = rect.width;
    viewH = rect.height;
    canvas.width = Math.round(viewW * dpr);
    canvas.height = Math.round(viewH * dpr);
    canvas.style.width = viewW + 'px';
    canvas.style.height = viewH + 'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    redraw();
    updateSelectionUI();
  }

  // =========================================================
  // Canvas Rendering Logic
  // =========================================================
  function redraw(){
    ctx.clearRect(0,0,viewW,viewH);
    for(const obj of objects){
      if(obj.type === 'stroke') drawStrokeObject(obj);
      else if(obj.type === 'image') drawImageObject(obj);
    }
    if(isRulerPreview && rulerStart && rulerCurrent) drawRulerPreview();
    if(currentStroke) drawStrokeObject(currentStroke);
  }

  function drawStrokeObject(obj){
    if(!obj.points || !obj.points.length) return;
    ctx.save();
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = obj.color;
    ctx.fillStyle = obj.color;
    ctx.globalAlpha = obj.opacity ?? 1;
    ctx.lineWidth = obj.size;

    const pts = obj.points;
    if(pts.length === 1){
      ctx.beginPath();
      ctx.arc(pts[0].x, pts[0].y, obj.size / 2, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for(let i = 1; i < pts.length; i++){
        const mx = (pts[i-1].x + pts[i].x) / 2;
        const my = (pts[i-1].y + pts[i].y) / 2;
        ctx.quadraticCurveTo(pts[i-1].x, pts[i-1].y, mx, my);
      }
      ctx.lineTo(pts[pts.length-1].x, pts[pts.length-1].y);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawImageObject(obj){
    if(!obj._imgEl){
      const img = new Image();
      img.src = obj.src;
      obj._imgEl = img;
      img.onload = () => redraw();
      return;
    }
    if(!obj._imgEl.complete) return;
    ctx.save();
    ctx.globalAlpha = 1;
    applyObjectTransform(ctx, obj);
    ctx.drawImage(obj._imgEl, obj.x, obj.y, obj.w, obj.h);
    ctx.restore();
  }

  function applyObjectTransform(ctx, obj){
    if(!obj.transform) return;
    const t = obj.transform;
    const cx = obj.x + obj.w/2;
    const cy = obj.y + obj.h/2;
    ctx.translate(cx + (t.tx||0), cy + (t.ty||0));
    ctx.rotate(t.rotation || 0);
    ctx.scale(t.sx ?? 1, t.sy ?? 1);
    ctx.translate(-cx, -cy);
  }

  function drawRulerPreview(){
    ctx.save();
    ctx.strokeStyle = currentColor;
    ctx.globalAlpha = currentTool === 'marker' ? MARKER_ALPHA : 1;
    ctx.lineCap = 'round';
    ctx.lineWidth = currentSize;
    ctx.beginPath();
    ctx.moveTo(rulerStart.x, rulerStart.y);
    ctx.lineTo(rulerCurrent.x, rulerCurrent.y);
    ctx.stroke();
    ctx.restore();

    const angleDeg = Math.round((radToDeg(Math.atan2(rulerCurrent.y-rulerStart.y, rulerCurrent.x-rulerStart.x)) + 360) % 360);
    showAngleBadge(rulerCurrent.x, rulerCurrent.y, `${angleDeg}°`);
  }

  function showAngleBadge(x,y,text){
    ensureSelectionUI();
    const el = selectionUI.angleEl;
    el.textContent = text;
    el.classList.remove('hidden');
    el.style.left = x + 'px';
    el.style.top = y + 'px';
  }

  // =========================================================
  // Object BBox & Hit Testing
  // =========================================================
  function calcStrokeBBox(stroke){
    const pts = stroke.points;
    if(!pts || !pts.length) return {x:0,y:0,w:0,h:0,cx:0,cy:0};
    let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
    for(const p of pts){
      minX = Math.min(minX, p.x);
      minY = Math.min(minY, p.y);
      maxX = Math.max(maxX, p.x);
      maxY = Math.max(maxY, p.y);
    }
    const pad = stroke.size / 2;
    minX -= pad; minY -= pad; maxX += pad; maxY += pad;
    return { x:minX, y:minY, w:maxX-minX, h:maxY-minY, cx:(minX+maxX)/2, cy:(minY+maxY)/2 };
  }

  function objectWorldBBox(obj){
    if(obj.type === 'stroke') return obj.bbox || calcStrokeBBox(obj);
    if(obj.type === 'image') return transformedRectBBox(obj.x, obj.y, obj.w, obj.h, obj.transform);
    return {x:0,y:0,w:0,h:0,cx:0,cy:0};
  }

  function transformedRectBBox(x,y,w,h,transform){
    const t = transform || {tx:0,ty:0,sx:1,sy:1,rotation:0};
    const cx = x + w/2; const cy = y + h/2;
    const pts = [{x,y},{x:x+w,y},{x:x+w,y:y+h},{x,y:y+h}].map(p => transformPoint(p, {cx,cy,...t}));
    let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
    for(const p of pts){
      minX = Math.min(minX,p.x); minY = Math.min(minY,p.y);
      maxX = Math.max(maxX,p.x); maxY = Math.max(maxY,p.y);
    }
    return {x:minX,y:minY,w:maxX-minX,h:maxY-minY,cx:(minX+maxX)/2,cy:(minY+maxY)/2};
  }

  function transformPoint(p, t){
    const x = p.x - t.cx; const y = p.y - t.cy;
    const sx = x * (t.sx ?? 1); const sy = y * (t.sy ?? 1);
    const c = Math.cos(t.rotation || 0); const s = Math.sin(t.rotation || 0);
    return {
      x: t.cx + (sx*c - sy*s) + (t.tx || 0),
      y: t.cy + (sx*s + sy*c) + (t.ty || 0)
    };
  }

  function hitTestObject(pt){
    for(let i=objects.length-1; i>=0; i--){
      const obj = objects[i];
      if(obj.type === 'stroke' && hitStroke(obj, pt)) return obj;
      if(obj.type === 'image' && hitImage(obj, pt)) return obj;
    }
    return null;
  }

  function hitStroke(stroke, pt){
    const bb = stroke.bbox || calcStrokeBBox(stroke);
    const pad = 10;
    if(pt.x < bb.x-pad || pt.x > bb.x+bb.w+pad || pt.y < bb.y-pad || pt.y > bb.y+bb.h+pad) return false;
    const pts = stroke.points;
    const threshold = stroke.size / 2 + 8;
    for(let i=1; i<pts.length; i++){
      if(pointToSegmentDistance(pt, pts[i-1], pts[i]) <= threshold) return true;
    }
    if(pts.length === 1) return dist(pt, pts[0]) <= threshold;
    return false;
  }

  function hitImage(obj, pt){
    const bb = objectWorldBBox(obj);
    return pt.x >= bb.x && pt.x <= bb.x+bb.w && pt.y >= bb.y && pt.y <= bb.y+bb.h;
  }

  function pointToSegmentDistance(p, a, b){
    const vx = b.x - a.x; const vy = b.y - a.y;
    const wx = p.x - a.x; const wy = p.y - a.y;
    const c1 = vx*wx + vy*wy;
    if(c1 <= 0) return Math.hypot(p.x-a.x, p.y-a.y);
    const c2 = vx*vx + vy*vy;
    if(c2 <= c1) return Math.hypot(p.x-b.x, p.y-b.y);
    const t = c1 / c2;
    return Math.hypot(p.x - (a.x + t*vx), p.y - (a.y + t*vy));
  }

  // =========================================================
  // Selection & Transformation Logic
  // =========================================================
  function selectObject(obj){
    if(!obj) { clearSelection(); return; }
    selection.ids = [obj.id];
    selection.transform = {tx:0,ty:0,sx:1,sy:1,rotation:0};
    updateSelectionBBox();
    updateSelectionUI();
  }

  function getSelectedObjects(){
    return objects.filter(o => selection.ids.includes(o.id));
  }

  function clearSelection(){
    selection.ids = [];
    selection.bbox = null;
    selection.transform = {tx:0,ty:0,sx:1,sy:1,rotation:0};
    updateSelectionUI();
  }

  function updateSelectionBBox(){
    const selected = getSelectedObjects();
    if(!selected.length){ selection.bbox = null; return; }
    let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
    for(const obj of selected){
      const bb = objectWorldBBox(obj);
      minX = Math.min(minX, bb.x); minY = Math.min(minY, bb.y);
      maxX = Math.max(maxX, bb.x + bb.w); maxY = Math.max(maxY, bb.y + bb.h);
    }
    selection.bbox = { x:minX, y:minY, w:maxX-minX, h:maxY-minY, cx:(minX+maxX)/2, cy:(minY+maxY)/2 };
  }

  function commitSelectionTransform(){
    const selected = getSelectedObjects();
    if(!selected.length || !selection.bbox) return;
    saveSnapshot();

    const t = selection.transform;
    const bbox = selection.bbox;

    for(const obj of selected){
      if(obj.type === 'stroke'){
        obj.points = obj.points.map(p => {
          return transformPoint(p, {
            cx:bbox.cx, cy:bbox.cy,
            tx:t.tx, ty:t.ty, sx:t.sx, sy:t.sy, rotation:t.rotation
          });
        });
        const scaleFactor = (Math.abs(t.sx) + Math.abs(t.sy)) / 2;
        obj.size = clamp(obj.size * scaleFactor, 1, 300);
        obj.bbox = calcStrokeBBox(obj);
      } else if(obj.type === 'image'){
        if(!obj.transform) obj.transform = {tx:0,ty:0,sx:1,sy:1,rotation:0};
        const ot = obj.transform;
        const ownCenter = { x: obj.x + obj.w/2, y: obj.y + obj.h/2 };
        const moved = transformPoint(ownCenter, {
          cx:bbox.cx, cy:bbox.cy,
          tx:t.tx, ty:t.ty, sx:t.sx, sy:t.sy, rotation:t.rotation
        });
        ot.tx += moved.x - ownCenter.x; ot.ty += moved.y - ownCenter.y;
        ot.sx *= t.sx; ot.sy *= t.sy; ot.rotation += t.rotation;
      }
    }

    selection.transform = {tx:0,ty:0,sx:1,sy:1,rotation:0};
    updateSelectionBBox();
    updateSelectionUI();
    redraw();
  }

  // =========================================================
  // Selection UI Creation & Management
  // =========================================================
  function ensureSelectionUI(){
    if(selectionUI.boxEl) return;

    const box = document.createElement('div');
    box.className = 'sel-box hidden';
    selectionOverlay.appendChild(box);
    selectionUI.boxEl = box;

    const panel = document.createElement('div');
    panel.className = 'selection-panel hidden';
    selectionOverlay.appendChild(panel);
    selectionUI.panelEl = panel;

    const angle = document.createElement('div');
    angle.className = 'angle-badge hidden';
    selectionOverlay.appendChild(angle);
    selectionUI.angleEl = angle;

    const rotateStick = document.createElement('div');
    rotateStick.className = 'rotate-stick hidden';
    selectionOverlay.appendChild(rotateStick);
    selectionUI.rotateStick = rotateStick;

    const handleNames = ['nw','ne','sw','se','rotate'];
    for(const name of handleNames){
      const h = document.createElement('div');
      h.className = `handle ${name==='rotate' ? 'rotate' : 'scale'} ${name}`;
      h.dataset.handle = name;
      h.addEventListener('pointerdown', onSelectionHandlePointerDown);
      selectionOverlay.appendChild(h);
      selectionUI.handles[name] = h;
    }

    panel.innerHTML = `
      <div class="group">
        <span class="label">色</span>
        <div id="selColorRow" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
      </div>
      <div class="group" style="margin-left:8px;">
        <span class="label">太さ</span>
        <input id="selSizeSlider" type="range" min="1" max="60" step="1" value="8" style="width:110px;">
        <span id="selSizeValue" class="range-value">8</span>
      </div>
      <div class="group" style="margin-left:8px;">
        <button class="tool-btn small" id="flipXBtn">左右反転</button>
        <button class="tool-btn small" id="flipYBtn">上下反転</button>
        <button class="tool-btn small" id="copyBtn">コピー</button>
        <button class="tool-btn small" id="pasteBtn">貼り付け</button>
        <button class="tool-btn small" id="deleteSelBtn">削除</button>
      </div>
    `;

    panel.querySelector('#selColorRow').append(...DEFAULT_COLORS.slice(0,12).map(c => {
      const sw = document.createElement('button');
      sw.className = 'swatch'; sw.style.background = c;
      sw.addEventListener('click', () => applySelectionColor(c));
      return sw;
    }));

    const selSizeSlider = panel.querySelector('#selSizeSlider');
    const selSizeValue = panel.querySelector('#selSizeValue');
    selSizeSlider.addEventListener('input', () => { selSizeValue.textContent = selSizeSlider.value; });
    selSizeSlider.addEventListener('change', () => applySelectionSize(Number(selSizeSlider.value)));

    panel.querySelector('#flipXBtn').addEventListener('click', () => { selection.transform.sx *= -1; commitSelectionTransform(); });
    panel.querySelector('#flipYBtn').addEventListener('click', () => { selection.transform.sy *= -1; commitSelectionTransform(); });
    panel.querySelector('#copyBtn').addEventListener('click', copySelection);
    panel.querySelector('#pasteBtn').addEventListener('click', pasteClipboard);
    panel.querySelector('#deleteSelBtn').addEventListener('click', deleteSelection);
  }

  function updateSelectionUI(){
    ensureSelectionUI();
    const { boxEl, panelEl, angleEl, rotateStick, handles } = selectionUI;

    if(!selection.bbox || !selection.ids.length){
      boxEl.classList.add('hidden'); panelEl.classList.add('hidden'); angleEl.classList.add('hidden'); rotateStick.classList.add('hidden');
      Object.values(handles).forEach(h => h.classList.add('hidden'));
      return;
    }

    const bb = selection.bbox;
    boxEl.classList.remove('hidden');
    boxEl.style.left = bb.x + 'px'; boxEl.style.top = bb.y + 'px'; boxEl.style.width = bb.w + 'px'; boxEl.style.height = bb.h + 'px';

    panelEl.classList.remove('hidden');
    panelEl.style.left = clamp(bb.x, 8, viewW - panelEl.offsetWidth - 8) + 'px';
    panelEl.style.top = Math.max(8, bb.y - 88) + 'px';

    const selected = getSelectedObjects();
    const avgSize = selected.length ? Math.round(selected.reduce((s,o)=>s+(o.size||8),0)/selected.length) : currentSize;
    panelEl.querySelector('#selSizeSlider').value = clamp(avgSize,1,60);
    panelEl.querySelector('#selSizeValue').textContent = clamp(avgSize,1,60);

    const pts = { nw:{x:bb.x,y:bb.y}, ne:{x:bb.x+bb.w,y:bb.y}, sw:{x:bb.x,y:bb.y+bb.h}, se:{x:bb.x+bb.w,y:bb.y+bb.h} };
    for(const k of ['nw','ne','sw','se']){
      handles[k].classList.remove('hidden');
      handles[k].style.left = pts[k].x + 'px'; handles[k].style.top = pts[k].y + 'px';
    }

    const rX = bb.cx; const rY = bb.y - 34;
    handles.rotate.classList.remove('hidden');
    handles.rotate.style.left = rX + 'px'; handles.rotate.style.top = rY + 'px';

    rotateStick.classList.remove('hidden');
    rotateStick.style.left = bb.cx + 'px'; rotateStick.style.top = rY + 'px';
    rotateStick.style.height = Math.max(12, bb.y - rY) + 'px';
    angleEl.classList.add('hidden');
  }

  function onSelectionHandlePointerDown(e){
    e.stopPropagation(); e.preventDefault();
    if(!selection.bbox) return;
    const handle = e.currentTarget.dataset.handle;
    const pt = getCanvasPoint(e);

    if(handle === 'rotate'){
      interaction = {
        type:'rotateSel', bbox: {...selection.bbox}, startTransform: {...selection.transform},
        baseAngle: Math.atan2(pt.y - selection.bbox.cy, pt.x - selection.bbox.cx)
      };
    } else {
      interaction = { type:'scaleSel', handle, startPt: pt, bbox: {...selection.bbox}, startTransform: {...selection.transform} };
    }
    canvas.setPointerCapture(e.pointerId);
  }

  function applySelectionColor(color){
    saveSnapshot();
    for(const obj of getSelectedObjects()) if(obj.type === 'stroke') obj.color = color;
    pushRecentColor(color); redraw(); updateSelectionUI();
  }

  function applySelectionSize(size){
    saveSnapshot();
    for(const obj of getSelectedObjects()) {
      if(obj.type === 'stroke') { obj.size = size; obj.bbox = calcStrokeBBox(obj); }
    }
    updateSelectionBBox(); updateSelectionUI(); redraw();
  }

  function copySelection(){ if(getSelectedObjects().length) clipboardObjects = deepClone(getSelectedObjects()); }
  function deleteSelection(){ if(!selection.ids.length) return; saveSnapshot(); objects = objects.filter(o => !selection.ids.includes(o.id)); clearSelection(); redraw(); }

  function pasteClipboard(){
    if(!clipboardObjects || !clipboardObjects.length) return;
    saveSnapshot();
    const pasted = deepClone(clipboardObjects).map(obj => {
      obj.id = crypto.randomUUID();
      if(obj.type === 'stroke'){
        obj.points = obj.points.map(p => ({x:p.x+20, y:p.y+20}));
        obj.bbox = calcStrokeBBox(obj);
      } else if(obj.type === 'image'){
        obj.x += 20; obj.y += 20; delete obj._imgEl;
      }
      return obj;
    });
    objects.push(...pasted); selection.ids = pasted.map(o => o.id);
    updateSelectionBBox(); updateSelectionUI(); redraw();
  }

  // =========================================================
  // Pointer Events Handlers
  // =========================================================
  canvas.addEventListener('pointerdown', (e) => {
    const pt = getCanvasPoint(e); isPointerDown = true;

    if(currentTool === 'select'){
      if(selection.bbox && pointInRect(pt, selection.bbox)){
        interaction = { type:'moveSel', startPt: pt }; canvas.setPointerCapture(e.pointerId); return;
      }
      const hit = hitTestObject(pt);
      if(hit){ selectObject(hit); interaction = { type:'moveSel', startPt: pt }; canvas.setPointerCapture(e.pointerId); }
      else clearSelection();
      return;
    }
    if(currentTool === 'eraserPixel'){ saveSnapshot(); interaction = { type:'erasePixel' }; eraseAtPoint(pt); redraw(); canvas.setPointerCapture(e.pointerId); return; }
    if(currentTool === 'eraserObject'){ saveSnapshot(); interaction = { type:'eraseObject' }; eraseObjectAtPoint(pt); redraw(); canvas.setPointerCapture(e.pointerId); return; }
    if(currentTool === 'ruler'){ interaction = { type:'ruler' }; rulerStart = pt; rulerCurrent = pt; isRulerPreview = true; redraw(); canvas.setPointerCapture(e.pointerId); return; }

    if(['pencil','marker'].includes(currentTool)){
      interaction = { type:'draw' };
      currentStroke = { id: crypto.randomUUID(), type: 'stroke', tool: currentTool, color: currentColor, size: currentSize, opacity: currentTool === 'marker' ? MARKER_ALPHA : PENCIL_ALPHA, points: [pt], bbox: null };
      redraw(); canvas.setPointerCapture(e.pointerId);
    }
  });

  canvas.addEventListener('pointermove', (e) => {
    const pt = getCanvasPoint(e);

    if(interaction?.type === 'draw' && currentStroke){
      const pts = currentStroke.points;
      if(pts.length > 0) {
        const prev = pts[pts.length - 1];
        if(Math.hypot(pt.x - prev.x, pt.y - prev.y) > 2) { pts.push(pt); redraw(); }
      }
      return;
    }
    if(interaction?.type === 'ruler'){ rulerCurrent = pt; redraw(); return; }
    if(interaction?.type === 'erasePixel'){ eraseAtPoint(pt); redraw(); return; }
    if(interaction?.type === 'eraseObject'){ eraseObjectAtPoint(pt); redraw(); return; }

    if(interaction?.type === 'moveSel' && selection.bbox){
      const dx = pt.x - interaction.startPt.x; const dy = pt.y - interaction.startPt.y;
      selection.bbox.x += dx; selection.bbox.y += dy; selection.bbox.cx += dx; selection.bbox.cy += dy;
      selection.transform.tx += dx; selection.transform.ty += dy;
      interaction.startPt = pt; updateSelectionUI(); return;
    }

    if(interaction?.type === 'scaleSel' && selection.bbox){
      const bb = interaction.bbox; const h = interaction.handle;
      let sx = 1, sy = 1;
      const dx = pt.x - interaction.startPt.x; const dy = pt.y - interaction.startPt.y;
      const sX = (h === 'nw' || h === 'sw') ? -1 : 1;
      const sY = (h === 'nw' || h === 'ne') ? -1 : 1;

      sx = 1 + sX * dx / Math.max(20, bb.w); sy = 1 + sY * dy / Math.max(20, bb.h);
      sx = Math.abs(sx) < 0.05 ? 0.05 * Math.sign(sx) : sx; sy = Math.abs(sy) < 0.05 ? 0.05 * Math.sign(sy) : sy;

      selection.transform.sx = interaction.startTransform.sx * sx;
      selection.transform.sy = interaction.startTransform.sy * sy;

      const corners = [{x:bb.x,y:bb.y},{x:bb.x+bb.w,y:bb.y},{x:bb.x+bb.w,y:bb.y+bb.h},{x:bb.x,y:bb.y+bb.h}].map(p => transformPoint(p, {
        cx:bb.cx, cy:bb.cy, tx:interaction.startTransform.tx, ty:interaction.startTransform.ty, sx:selection.transform.sx, sy:selection.transform.sy, rotation:selection.transform.rotation
      }));
      const xs = corners.map(c=>c.x); const ys = corners.map(c=>c.y);
      selection.bbox = { x:Math.min(...xs), y:Math.min(...ys), w:Math.max(...xs)-Math.min(...xs), h:Math.max(...ys)-Math.min(...ys), cx:(Math.min(...xs)+Math.max(...xs))/2, cy:(Math.min(...ys)+Math.max(...ys))/2 };
      updateSelectionUI(); return;
    }

    if(interaction?.type === 'rotateSel' && selection.bbox){
      const bb = interaction.bbox;
      const delta = Math.atan2(pt.y - bb.cy, pt.x - bb.cx) - interaction.baseAngle;
      const deg = Math.round(radToDeg(interaction.startTransform.rotation + delta));
      selection.transform.rotation = degToRad(deg);

      const corners = [{x:bb.x,y:bb.y},{x:bb.x+bb.w,y:bb.y},{x:bb.x+bb.w,y:bb.y+bb.h},{x:bb.x,y:bb.y+bb.h}].map(p => transformPoint(p,{
        cx:bb.cx, cy:bb.cy, tx:interaction.startTransform.tx, ty:interaction.startTransform.ty, sx:interaction.startTransform.sx, sy:interaction.startTransform.sy, rotation:selection.transform.rotation
      }));
      const xs = corners.map(c=>c.x); const ys = corners.map(c=>c.y);
      selection.bbox = { x:Math.min(...xs), y:Math.min(...ys), w:Math.max(...xs)-Math.min(...xs), h:Math.max(...ys)-Math.min(...ys), cx:(Math.min(...xs)+Math.max(...xs))/2, cy:(Math.min(...ys)+Math.max(...ys))/2 };
      updateSelectionUI(); showAngleBadge(bb.cx, bb.y - 42, `${deg}°`); return;
    }
  });

  canvas.addEventListener('pointerup', () => {
    isPointerDown = false;
    if(interaction?.type === 'draw' && currentStroke){
      if(currentStroke.points.length >= 1){ saveSnapshot(); calcStrokeBBox(currentStroke); currentStroke.bbox = calcStrokeBBox(currentStroke); objects.push(currentStroke); }
      currentStroke = null; redraw();
    }
    if(interaction?.type === 'ruler' && rulerStart && rulerCurrent){
      saveSnapshot();
      const stroke = { id: crypto.randomUUID(), type: 'stroke', tool: currentTool === 'marker' ? 'marker' : 'pencil', color: currentColor, size: currentSize, opacity: currentTool === 'marker' ? MARKER_ALPHA : PENCIL_ALPHA, points: [rulerStart, rulerCurrent], bbox: null };
      stroke.bbox = calcStrokeBBox(stroke); objects.push(stroke);
      isRulerPreview = false; rulerStart = rulerCurrent = null; selectionUI.angleEl?.classList.add('hidden'); redraw();
    }
    if(['moveSel', 'scaleSel', 'rotateSel'].includes(interaction?.type)){ if(selection.ids.length) commitSelectionTransform(); selectionUI.angleEl?.classList.add('hidden'); }
    interaction = null;
  });

  function pointInRect(pt, rect){ return pt.x >= rect.x && pt.x <= rect.x + rect.w && pt.y >= rect.y && pt.y <= rect.y + rect.h; }

  // =========================================================
  // Eraser Implementations
  // =========================================================
  function eraseObjectAtPoint(pt){
    const hit = hitTestObject(pt);
    if(hit){ objects = objects.filter(o => o.id !== hit.id); if(selection.ids.includes(hit.id)) clearSelection(); }
  }

  function eraseAtPoint(pt){
    const radius = Math.max(6, currentSize * 0.75); const newObjects = [];
    for(const obj of objects){
      if(obj.type !== 'stroke'){ newObjects.push(obj); continue; }
      const bb = obj.bbox || calcStrokeBBox(obj);
      if(pt.x < bb.x-radius || pt.x > bb.x+bb.w+radius || pt.y < bb.y-radius || pt.y > bb.y+bb.h+radius){ newObjects.push(obj); continue; }

      const segments = []; let currentSeg = [];
      for(const p of obj.points){
        if(Math.hypot(p.x - pt.x, p.y - pt.y) <= radius + obj.size/2){
          if(currentSeg.length >= 1) segments.push(currentSeg);
          currentSeg = [];
        } else { currentSeg.push(p); }
      }
      if(currentSeg.length >= 1) segments.push(currentSeg);

      if(!segments.length) continue;
      if(segments.length === 1 && segments[0].length === obj.points.length){ newObjects.push(obj); }
      else {
        for(const seg of segments){
          const cloned = { ...deepClone(obj), id: crypto.randomUUID(), points: seg, bbox: null };
          cloned.bbox = calcStrokeBBox(cloned); newObjects.push(cloned);
        }
      }
    }
    objects = newObjects;
    if(selection.ids.length){
      const alive = new Set(objects.map(o=>o.id)); selection.ids = selection.ids.filter(id => alive.has(id));
      if(selection.ids.length){ updateSelectionBBox(); updateSelectionUI(); } else clearSelection();
    }
  }

  // =========================================================
  // Toolbar & Files Integration
  // =========================================================
  function setTool(tool){ currentTool = tool; Object.entries(toolBtns).forEach(([k,btn]) => btn.classList.toggle('active', k===tool)); if(tool !== 'select') clearSelection(); redraw(); }
  function setEraser(mode){ eraserMode = mode; Object.entries(eraserBtns).forEach(([k,btn]) => btn.classList.toggle('active', k===mode)); if(mode === 'clear'){ if(confirm('全消ししますか？')){ saveSnapshot(); objects = []; clearSelection(); redraw(); } else { eraserMode = 'pixel'; syncUI(); } return; } currentTool = mode === 'pixel' ? 'eraserPixel' : 'eraserObject'; Object.values(toolBtns).forEach(btn => btn.classList.remove('active')); clearSelection(); }
  function syncUI(){ sizeSlider.value = currentSize; sizeValue.textContent = currentSize; renderPalette(); Object.entries(toolBtns).forEach(([k,btn]) => btn.classList.toggle('active', currentTool===k)); Object.entries(eraserBtns).forEach(([k,btn]) => btn.classList.toggle('active', eraserMode===k)); }

  function renderPalette(){
    paletteGrid.innerHTML = '';
    DEFAULT_COLORS.forEach(c => {
      const sw = document.createElement('button'); sw.className = 'swatch'; sw.style.background = c;
      if(normalizeColor(c).toLowerCase() === normalizeColor(currentColor).toLowerCase()) sw.classList.add('active');
      sw.addEventListener('click', () => { currentColor = c; pushRecentColor(c); renderPalette(); });
      paletteGrid.appendChild(sw);
    });
    renderRecentColors();
  }

  function renderRecentColors(){
    recentColorsEl.innerHTML = '';
    recentColors.forEach(c => {
      const sw = document.createElement('button'); sw.className = 'swatch'; sw.style.background = c;
      sw.addEventListener('click', () => { currentColor = c; renderPalette(); });
      recentColorsEl.appendChild(sw);
    });
  }

  toolBtns.pencil.addEventListener('click', ()=>setTool('pencil'));
  toolBtns.marker.addEventListener('click', ()=>setTool('marker'));
  toolBtns.ruler.addEventListener('click', ()=>setTool('ruler'));
  toolBtns.select.addEventListener('click', ()=>setTool('select'));
  eraserBtns.pixel.addEventListener('click', ()=>setEraser('pixel'));
  eraserBtns.object.addEventListener('click', ()=>setEraser('object'));
  eraserBtns.clear.addEventListener('click', ()=>setEraser('clear'));

  sizeSlider.addEventListener('input', () => { currentSize = Number(sizeSlider.value); sizeValue.textContent = currentSize; });
  paletteToggle.addEventListener('click', (e) => { e.stopPropagation(); palettePop.classList.toggle('open'); });
  document.addEventListener('click', (e) => { if(!palettePop.contains(e.target) && e.target !== paletteToggle) palettePop.classList.remove('open'); });

  customColorPicker.addEventListener('change', () => { currentColor = customColorPicker.value; pushRecentColor(currentColor); renderPalette(); });
  addCustomColorBtn.addEventListener('click', () => { currentColor = customColorPicker.value; pushRecentColor(currentColor); renderPalette(); });

  undoBtn.addEventListener('click', () => { if(!undoStack.length) return; redoStack.push(serializeDoc()); restoreDoc(undoStack.pop()); });
  redoBtn.addEventListener('click', () => { if(!redoStack.length) return; undoStack.push(serializeDoc()); restoreDoc(redoStack.pop()); });
  saveBtn.addEventListener('click', () => { const json = serializeDoc(); localStorage.setItem(STORAGE_KEY_DOC, json); const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([json], {type:'application/json'})); a.download = 'canvas_data.json'; a.click(); });
  loadBtn.addEventListener('click', () => loadInput.click());
  loadInput.addEventListener('change', async (e) => { const file = e.target.files?.[0]; if(file) { saveSnapshot(); restoreDoc(await file.text()); } loadInput.value = ''; });

  insertImageBtn.addEventListener('click', () => imageInput.click());
  imageInput.addEventListener('change', (e) => {
    const file = e.target.files?.[0]; if(!file) return;
    const r = new FileReader(); r.onload = () => {
      const img = new Image(); img.onload = () => {
        saveSnapshot(); const maxW = Math.min(viewW * 0.6, img.width); const s = maxW / img.width; const w = img.width * s; const h = img.height * s;
        const obj = { id: crypto.randomUUID(), type:'image', src: r.result, x:(viewW-w)/2, y:(viewH-h)/2, w, h, transform:{tx:0,ty:0,sx:1,sy:1,rotation:0} };
        objects.push(obj); selectObject(obj); redraw();
      }; img.src = r.result;
    }; r.readAsDataURL(file);
    imageInput.value = '';
  });

  window.addEventListener('keydown', (e) => {
    const mod = e.ctrlKey || e.metaKey;
    if(mod && e.key.toLowerCase() === 'z') { e.preventDefault(); undoBtn.click(); }
    if(mod && (e.key.toLowerCase() === 'y' || (e.shiftKey && e.key.toLowerCase() === 'z'))) { e.preventDefault(); redoBtn.click(); }
    if(mod && e.key.toLowerCase() === 'c') { if(selection.ids.length) { e.preventDefault(); copySelection(); } }
    if(mod && e.key.toLowerCase() === 'v') { e.preventDefault(); pasteClipboard(); }
    if(e.key === 'Delete' || e.key === 'Backspace') { if(selection.ids.length) { e.preventDefault(); deleteSelection(); } }
  });

  window.addEventListener('resize', resizeCanvas);
  
  // Initialize
  ensureSelectionUI(); syncUI(); resizeCanvas();
  const saved = localStorage.getItem(STORAGE_KEY_DOC);
  if(saved) { try { restoreDoc(saved); } catch(e){} } else redraw();
})();
</script>
